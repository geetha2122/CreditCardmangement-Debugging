<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Credit Card Form</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<nav class="navbar">
    <div class="nav-brand">&#128179; CreditCard Manager</div>
    <div class="nav-links">
        <a th:href="@{/cards}">All Cards</a>
        <a th:href="@{/cards/new}">+ Add New Card</a>
        <a th:href="@{/cards/search}">Search</a>
        <a th:href="@{/h2-console}" target="_blank">H2 Console</a>
    </div>
</nav>

<div class="container">
    <div class="card">
        <h2 th:text="${card.id == null} ? 'Add New Credit Card' : 'Edit Credit Card'">Card Form</h2>

        <form th:action="${card.id == null} ? @{/cards/save} : @{/cards/update/{id}(id=${card.id})}" th:object="${card}" method="post" class="form">

            <div class="form-group" th:if="${card.id != null}">
                <label>Card ID</label>
                <input type="text" th:value="${card.id}" class="form-control" readonly>
                <input type="hidden" th:field="*{id}">
            </div>

            <div class="form-group">
                <label for="cardholderName">Cardholder Name *</label>
                <input type="text" id="cardholderName" th:field="*{cardholderName}"
                       class="form-control" placeholder="Full name on card">
                <span class="error" th:if="${#fields.hasErrors('cardholderName')}"
                      th:errors="*{cardholderName}"></span>
            </div>

            <div class="form-group">
                <label for="cardNumber">Card Number *</label>
                <input type="text" id="cardNumber" th:field="*{cardNumber}"
                       class="form-control" placeholder="16-digit card number"
                       th:readonly="${card.id != null}">
                <span class="error" th:if="${#fields.hasErrors('cardNumber')}"
                      th:errors="*{cardNumber}"></span>
            </div>

            <div class="form-group">
                <label for="cardType">Card Type *</label>
                <select id="cardType" th:field="*{cardType}" class="form-control">
                    <option value="">-- Select Type --</option>
                    <option th:each="type : ${cardTypes}" th:value="${type}" th:text="${type}"></option>
                </select>
                <span class="error" th:if="${#fields.hasErrors('cardType')}"
                      th:errors="*{cardType}"></span>
            </div>

            <div class="form-group">
                <label for="expiryDate">Expiry Date *</label>
                <input type="date" id="expiryDate" th:field="*{expiryDate}" class="form-control">
                <span class="error" th:if="${#fields.hasErrors('expiryDate')}"
                      th:errors="*{expiryDate}"></span>
            </div>

            <div class="form-group">
                <label for="creditLimit">Credit Limit ($) *</label>
                <input type="number" id="creditLimit" th:field="*{creditLimit}"
                       class="form-control" step="0.01" min="0" placeholder="e.g. 5000">
                <span class="error" th:if="${#fields.hasErrors('creditLimit')}"
                      th:errors="*{creditLimit}"></span>
            </div>

            <div class="form-group">
                <label for="currentBalance">Current Balance ($)</label>
                <input type="number" id="currentBalance" th:field="*{currentBalance}"
                       class="form-control" step="0.01" min="0" placeholder="0.00">
                <span class="error" th:if="${#fields.hasErrors('currentBalance')}"
                      th:errors="*{currentBalance}"></span>
            </div>

            <div class="form-group">
                <label for="isActive">Status</label>
                <select id="isActive" th:field="*{isActive}" class="form-control">
                    <option value="true">Active</option>
                    <option value="false">Inactive</option>
                </select>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn btn-success">
                    <span th:text="${card.id == null} ? 'Save Card' : 'Update Card'">Save</span>
                </button>
                <a th:href="@{/cards}" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>
</body>
</html>
